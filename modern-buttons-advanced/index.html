<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mega Modern Buttons</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <button class="btn btn-gradient-shift">
        <span>Gradient Shift</span>
      </button>

      <button class="btn btn-neon-glow">
        <span>Neon Glow</span>
      </button>

      <button class="btn btn-morphing">
        <span>Morphing</span>
      </button>

      <button class="btn btn-glitch" data-text="Glitch Effect">
        <span>Glitch Effect</span>
      </button>

      <button class="btn btn-liquid">
        <span>Liquid Fill</span>
        <div class="liquid"></div>
      </button>

      <button class="btn btn-aurora">
        <span>Aurora</span>
      </button>

      <button class="btn btn-flip">
        <div class="flip-inner">
          <div class="flip-front"><span>Hover Me</span></div>
          <div class="flip-back"><span>✦ WOW ✦</span></div>
        </div>
      </button>

      <button class="btn btn-magnetic">
        <span>Magnetic</span>
      </button>
    </div>
    <script src="script.js"></script>
  </body>
</html>
